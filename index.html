<!DOCTYPE html>


<html lang="en">



<header>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motorstar ER175 Parts Finder</title>
<link rel="stylesheet" href="style.css">


</header>

<body>

<!-- SAAS BAR (TOP HEADER) -->
<div id="supportBar" class="saas-bar">
    <div class="saas-left">
        <span class="dot"></span>
        <strong>Support this project by following me!</strong>
    </div>

    <div class="saas-right">
        <a class="btn yt" href="https://www.youtube.com/@jpxcariman" target="_blank">
            ▶ YouTube
        </a>

        <a class="btn tt" href="https://www.tiktok.com/@jpcariman" target="_blank">
             ♪ TikTok
        </a>

        <a class="btn fb" href="https://www.facebook.com/jeypixc" target="_blank">
             f Facebook
        </a>
    </div>
</div>

    <header class="hero">
    <div class="hero-title">Motorstar ER175 Support Hub</div>
    <div class="hero-subtitle">
        Genuine and Aftermarket Parts, Manual and Troubleshooting Guides
    </div>
</header>

    <div class="segmented">
    <button class="seg active" data-tab="manual" onclick="switchTab('manual')">Manual</button>
    <button class="seg" data-tab="troubleshoot" onclick="switchTab('troubleshoot')">Troubleshoot</button>
    <button class="seg" data-tab="aftermarket" onclick="switchTab('aftermarket')">Parts</button>
    <button class="seg" data-tab="oem" onclick="switchTab('oem')">Genuine Parts</button>
</div>

    <!-- CHIPS WRAPPER-->
     <div class="chips-wrapper">

    <div class="chips" id="chips"></div>

    <button class="chips-next" onclick="scrollChips()">
        ›
    </button>

</div>

    <!-- SEARCH -->
    <div class="search-box">
    <input id="search" placeholder="Search parts...">
    </div>

    <!-- RESET BUTTON -->
    <div class="reset-container">
    <button class="reset-btn" onclick="resetFilters()">
    ↺ Reset Filters</button>
    </div>

    <!-- PRODUCTS -->
    <div id="products"></div>

    <!-- SUGGESTIONS -->
    <div id="suggestions"></div>

    <!-- MANUAL CONTENT -->
    <div id="manualContent"></div>

    <!-- TROUBLESHOOT CONTENT -->
    <div id="troubleshootContent"></div>



<!-- MODALS -->
 <div id="linkModal" class="link-modal">
  <div class="link-modal-backdrop" onclick="closeModal()"></div>

  <div class="link-modal-content">
    <button class="close-modal" onclick="closeModal()">×</button>
    <iframe id="modalFrame"></iframe>
  </div>
</div>

<div id="componentModal" class="component-modal">
<div class="component-modal-box">

<button 
class="component-close"
onclick="closeComponentViewer()">
×
</button>

<div class="component-view-image">

<div class="viewer-stage">


<img 
id="componentViewerImage"
src=""
>



<div 
id="componentViewerMarker"
class="viewer-marker">

</div>


</div>


</div>

<div class="viewer-controls">

<button onclick="previousComponent()">
← Previous Part
</button>

<button onclick="openNextComponent()">
Next Part →
</button>




</div>


<div class="component-info">


<h3 id="componentViewerTitle"></h3>

<img 
id="componentViewerZoom"
class="component-viewer-zoom"
>

<p id="componentViewerLocation"></p>


<p id="componentViewerNotes"></p>


</div>



</div>


</div>


    <footer class="footer">
    <div class="footer-title">Motorstar ER175 Support Hub</div>

    <div class="footer-links">
        <a href="https://www.youtube.com/@jpxcariman" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@jpcariman" target="_blank">TikTok</a>
        <a href="https://www.facebook.com/jeypixc" target="_blank">Facebook</a>
    </div>

    <div class="footer-note">
        Built for ER175 owners, mechanics, and DIY Repairs.
    </div>
</footer>

<!-- MODALS -->
 <div id="linkModal" class="link-modal">
  <div class="link-modal-backdrop" onclick="closeModal()"></div>

  <div class="link-modal-content">
    <button class="close-modal" onclick="closeModal()">×</button>
    <iframe id="modalFrame"></iframe>
  </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="app.js"></script>



</body>

</html>
